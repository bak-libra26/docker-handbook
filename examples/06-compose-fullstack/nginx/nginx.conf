# Nginx 리버스 프록시 설정 — Spring Boot 백엔드로 요청 전달
upstream backend {
    server backend:8080;     # docker-compose 서비스명으로 접근
}

server {
    listen 80;

    # API 요청 → Spring Boot
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 정적 파일 (프론트엔드)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
